<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <title>每週必做事項與年度年曆看板</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/calendar.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js" defer></script>
    <link rel="icon" href="data:,">
</head>

<body>

    <!-- 版本按鈕：實際顯示的版本號與更新內容都由 js/version.js 的 VERSION_HISTORY 陣列控制，
         每次要上傳新版本前，只要在該陣列最上面新增一筆新版本紀錄即可，按鈕會自動顯示最新版本號。
         點擊按鈕可以打開版本更新紀錄視窗，查看每個版本改了什麼。 -->
    <button id="site-version-badge" class="version-badge-btn" title="查看版本更新紀錄">v...</button>

    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div>資料載入中...</div>
    </div>

    <!-- ================= 帳號密碼登入 / 註冊畫面（未登入時顯示，取代原本的匿名登入） ================= -->
    <div id="login-overlay" class="auth-overlay hidden">
        <div class="login-box">
            <h2 id="login-title">登入</h2>
            <input type="text" id="login-nickname" class="hidden" placeholder="暱稱（顯示在主頁上）" autocomplete="nickname">
            <input type="email" id="login-email" placeholder="電子郵件" autocomplete="username">
            <input type="password" id="login-password" placeholder="密碼" autocomplete="current-password">
            <label class="remember-me-row">
                <input type="checkbox" id="remember-me-checkbox" checked>
                記住我（下次自動登入）
            </label>
            <div id="login-error" class="login-error hidden"></div>
            <button id="login-submit-btn">登入</button>
            <div class="login-switch-row">
                <span id="login-switch-hint">還沒有帳號？</span>
                <a href="#" id="login-switch-mode">註冊新帳號</a>
            </div>
        </div>
    </div>

    <!-- ================= 每週必做事項頁（預設顯示） ================= -->
    <div id="view-todo" class="container">
        <div class="control-panel">
            <div>
                <div class="week-picker">
                    <button id="week-picker-toggle-btn" type="button" class="week-picker-toggle">第 <span id="week-picker-current-label">1</span> 週 ▾</button>
                    <div id="week-picker-panel" class="week-picker-panel hidden">
                        <div id="week-picker-grid" class="week-picker-grid"></div>
                    </div>
                </div>
                <button id="view-calendar-btn" onclick="switchPage('calendar')" disabled title="資料載入中...">年度總覽</button>
            </div>
            <div>
                <span id="user-greeting" class="user-greeting"></span>
                <button id="logout-btn" class="logout-btn">登出</button>
            </div>
        </div>

        <div class="main-content">
            <div class="mobile-list-tabs">
                <button id="mobile-tab-main" class="tab-btn active" onclick="switchMobileListTab('main')">項目清單</button>
                <button id="mobile-tab-temp" class="tab-btn" onclick="switchMobileListTab('temp')">代辦清單</button>
            </div>

            <div class="left-column">
                <h1 id="chart-title"><button id="back-btn" class="hidden back-icon-btn" title="返回">←</button><span id="chart-title-text">每週必做事項總覽</span></h1>
                <div class="chart-wrapper">
                    <canvas id="todoChart"></canvas>
                </div>
            </div>
            
            <div id="todo-list-wrapper" class="todo-list-wrapper">
                <div class="list-header">
                    <h3>項目清單</h3>
                    <div>
                        <button id="open-add-modal-btn" style="padding: 6px 12px; font-size: 14px;">新增</button>
                        <button id="open-weight-view-btn" style="padding: 6px 12px; font-size: 14px; background-color: #7c6bd6;">加權</button>
                        <button id="open-edit-modal-btn" style="padding: 6px 12px; font-size: 14px; background-color: #ff9f43;">編輯</button>
                    </div>
                </div>
                <ul id="todo-list"></ul>
            </div>

            <div id="temp-task-list-wrapper" class="todo-list-wrapper temp-task-list-wrapper mobile-tab-hidden">
                <div class="list-header">
                    <h3>臨時待辦</h3>
                    <div>
                        <button id="open-add-temp-modal-btn" style="padding: 6px 12px; font-size: 13px;">新增</button>
                        <button id="open-temp-edit-modal-btn" style="padding: 6px 12px; font-size: 13px; background-color: #ff9f43;">編輯模式</button>
                        <button id="open-temp-history-btn" style="padding: 6px 12px; font-size: 13px; background-color: #64748b;">歷史紀錄</button>
                    </div>
                </div>
                <ul id="temp-task-list"></ul>
            </div>
        </div>
    </div>

    <!-- ================= 年度總覽頁（預設隱藏，切換時才顯示） ================= -->
    <div id="view-calendar" class="container calendar-main-container hidden">
        <div class="control-panel">
            <h2>2026年的統計</h2>
            <button id="nav-back-btn" onclick="switchPage('todo')">返回主圖表頁</button>
        </div>

        <div class="calendar-top-dashboard">
            <div class="summary-stats-section">
                <h3>任務總次數</h3>
                <div id="annual-stats-classified-container" class="stats-classified-flex">
                    <div class="no-data-hint">目前全年度尚無任何打卡執行紀錄。</div>
                </div>
            </div>
        </div>

        <div class="calendar-dashboard">
            <div class="calendar-left">
                <div class="month-nav-header">
                    <div class="month-nav-controls">
                        <button id="prev-month-btn" class="month-nav-btn" title="上個月">‹</button>
                        <div id="current-month-label" class="current-month-label">一月</div>
                        <button id="next-month-btn" class="month-nav-btn" title="下個月">›</button>
                    </div>
                    <button id="open-annual-overview-btn" class="annual-overview-btn">年度總覽</button>
                </div>
                <div id="months-view-container" class="single-month-grid"></div>
            </div>

            <div class="calendar-right">
                <h3 id="focus-date-title">讀取中...</h3>
                <div id="focus-date-week-hint"></div>
                <div id="focus-date-details">選擇年曆上的日期查看當天進度。</div>
            </div>
        </div>
    </div>

    <!-- ================= 年度總覽彈窗：4x3 排列 12 個月，不可互動，只顯示各月達成率 ================= -->
    <div id="annual-overview-modal" class="modal-overlay hidden">
        <div class="modal-content annual-overview-content">
            <div class="modal-header">
                <h4>年度總覽</h4>
                <button class="close-modal-btn" id="close-annual-overview-btn">&times;</button>
            </div>
            <div id="annual-overview-grid" class="annual-overview-grid"></div>
        </div>
    </div>

    <!-- ================= 新增/編輯任務彈出視窗（兩個頁面共用，放在外層） ================= -->
    <div id="task-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h4 id="modal-form-title">編輯 / 新增事項</h4>
                <button class="close-modal-btn" id="close-modal-btn">&times;</button>
            </div>

            <div id="add-task-form" class="add-form">
                <div class="form-row">
                    <select id="task-type-select" class="hidden" onchange="toggleTaskTypeView()">
                        <option value="regular">每週重複常規任務</option>
                        <option value="temporary">按特定日期臨時任務</option>
                    </select>
                    <input type="date" id="new-task-date" class="hidden" value="2026-01-01">
                </div>

                <div id="category-select-row" class="form-row">
                    <select id="task-category-select">
                        <option value="__new__">新增全新大類別</option>
                    </select>
                    <input type="text" id="new-category-name" placeholder="新大類別名稱...">
                </div>
                
                <div class="form-row">
                    <input type="text" id="new-task-name" placeholder="輸入任務名稱...">
                    <input type="number" id="new-task-total" min="1" value="1" title="本週目標次數">
                </div>
            
                <div id="color-picker-section" class="form-row" style="flex-direction: column; align-items: flex-start; gap: 8px;">
                    <label style="font-weight: bold; color: #1a4d6c;">挑選顏色：</label>
                    <div id="color-palette-container" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 5px;"></div>
                </div>
                <div style="width: 100%; display: flex; justify-content: flex-end; margin-top: 5px;">
                    <button id="add-task-btn">確認儲存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= 版本更新紀錄彈窗 ================= -->
    <div id="version-history-modal" class="modal-overlay hidden">
        <div class="modal-content version-history-content">
            <div class="modal-header">
                <h4>版本更新紀錄</h4>
                <button class="close-modal-btn" id="close-version-history-btn">&times;</button>
            </div>
            <div id="version-history-list"></div>
        </div>
    </div>

    <!-- ================= 臨時任務歷史紀錄（已完成的） ================= -->
    <div id="temp-history-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h4>臨時任務歷史紀錄</h4>
                <button class="close-modal-btn" id="close-temp-history-modal-btn">&times;</button>
            </div>
            <ul id="temp-history-list" style="list-style:none; padding:0; margin:0; max-height:55vh; overflow-y:auto;"></ul>
        </div>
    </div>

    <script src="js/firebase-init.js" defer></script>
    <script src="js/auth-ui.js" defer></script>
    <script src="js/date-utils.js" defer></script>
    <script src="js/data.js" defer></script>
    <script src="js/chart.js" defer></script>
    <script src="js/app.js" defer></script>
    <script src="js/calendar.js" defer></script>
    <script src="js/spa.js" defer></script>
    <script src="js/version.js" defer></script>
</body>
</html>
